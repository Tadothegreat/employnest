<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmployNest - Forgot Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav class="navbar">
            <a href="{{ url_for('home') }}" style="text-decoration: none; color: #667eea;">
                <h1>🐦 EmployNest</h1>
            </a>
            <div class="nav-links">
                <a href="{{ url_for('login') }}" class="btn btn-outline">Sign In</a>
                <a href="{{ url_for('register') }}" class="btn btn-primary">Sign Up</a>
            </div>
        </nav>

        <!-- Forgot Password Form -->
        <div class="form-container">
            <h2>🔐 Forgot Password</h2>
            <p class="form-intro">Enter your email address and we'll send you a link to reset your password.</p>
            
            <form method="POST" action="{{ url_for('forgot_password') }}">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" name="email" id="email" placeholder="you@example.com" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">Send Reset Link</button>
            </form>
            
            <p style="text-align: center; margin-top: 20px;">
                Remember your password? <a href="{{ url_for('login') }}">Sign In</a>
            </p>
            
            <p style="text-align: center; margin-top: 15px;">
                <a href="{{ url_for('home') }}">← Back to Home</a>
            </p>
        </div>
    </div>

<script>
function togglePassword(fieldId, iconId) {
    const passwordField = document.getElementById(fieldId);
    const toggleIcon = document.getElementById(iconId);
    if (passwordField.type === 'password') {
        passwordField.type = 'text';
        toggleIcon.textContent = '🙈';
    } else {
        passwordField.type = 'password';
        toggleIcon.textContent = '👁️';
    }
}
</script>
