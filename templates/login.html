<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmployNest - Sign In</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav class="navbar">
            <a href="{{ url_for('home') }}" style="text-decoration: none; color: #667eea;">
                <h1>🐦 EmployNest</h1>
            </a>
            <div class="nav-links">
                <a href="{{ url_for('register') }}" class="btn btn-outline">Sign Up</a>
            </div>
        </nav>

        <!-- Login Form -->
        <div class="form-container">
            <h2>Welcome Back</h2>
            <p class="form-intro">Sign in to access your EmployNest account</p>
            
            <!-- Success Message (if password was reset) -->
            {% if request.args.get('reset') == 'success' %}
                <div class="alert alert-success" style="margin-bottom: 20px;">
                    ✅ Your password has been reset successfully! Please sign in.
                </div>
            {% endif %}
            
            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" name="email" id="email" placeholder="you@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" placeholder="••••••••" required><span onclick="togglePassword('password', 'passwordToggle')" style="margin-left: -30px; cursor: pointer; font-size: 18px;" id="passwordToggle">👁️</span>
                </div>
                
                <p style="text-align: right; margin-top: 5px; margin-bottom: 15px;">
                    <a href="{{ url_for('forgot_password') }}" style="font-size: 14px;">Forgot Password?</a>
                </p>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </form>
            
            <p style="text-align: center; margin-top: 20px;">
                Don't have an account? <a href="{{ url_for('register') }}">Sign Up</a>
            </p>
            
            <p style="text-align: center; margin-top: 15px;">
                <a href="{{ url_for('home') }}">← Back to Home</a>
            </p>
        </div>
    </div>

<script>
function togglePassword(fieldId, iconId) {
    const passwordField = document.getElementById(fieldId);
    const toggleIcon = document.getElementById(iconId);
    if (passwordField.type === 'password') {
        passwordField.type = 'text';
        toggleIcon.textContent = '🙈';
    } else {
        passwordField.type = 'password';
        toggleIcon.textContent = '👁️';
    }
}
</script>
