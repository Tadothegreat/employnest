<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmployNest - Post a Job</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav class="navbar">
            <a href="{{ url_for('home') }}" style="text-decoration: none; color: #667eea;">
                <h1>🐦 EmployNest</h1>
            </a>
            <div class="nav-links">
                <span>Welcome, {{ session.name }}!</span>
                <a href="{{ url_for('dashboard') }}" class="btn btn-outline">Dashboard</a>
                <a href="{{ url_for('logout') }}" class="btn btn-outline">Logout</a>
            </div>
        </nav>

        <!-- Post Job Form -->
        <div class="form-container-wide">
            <h2>📋 Post a New Job</h2>
            <p>Fill in the details below to list your job opening</p>

            <form method="POST" action="{{ url_for('post_job') }}" class="job-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="title">Job Title *</label>
                        <input type="text" name="title" id="title" required 
                               placeholder="e.g., Senior Software Engineer">
                    </div>
                    
                    <div class="form-group">
                        <label for="company">Company Name *</label>
                        <input type="text" name="company" id="company" required 
                               placeholder="e.g., TechCorp Zimbabwe">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="location">Location *</label>
                        <input type="text" name="location" id="location" required 
                               placeholder="e.g., Harare, Bulawayo, Remote">
                    </div>
                    
                    <div class="form-group">
                        <label for="salary">Salary Range</label>
                        <input type="text" name="salary" id="salary" 
                               placeholder="e.g., $500 - $1000 / month">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="job_type">Job Type *</label>
                        <select name="job_type" id="job_type" required>
                            <option value="">Select Job Type</option>
                            <option value="Full-time">Full-time</option>
                            <option value="Part-time">Part-time</option>
                            <option value="Contract">Contract</option>
                            <option value="Internship">Internship</option>
                            <option value="Freelance">Freelance</option>
                            <option value="Remote">Remote</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="category">Category *</label>
                        <select name="category" id="category" required>
                            <option value="">Select Category</option>
                            <option value="Technology">Technology</option>
                            <option value="Healthcare">Healthcare</option>
                            <option value="Education">Education</option>
                            <option value="Finance">Finance</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Sales">Sales</option>
                            <option value="Engineering">Engineering</option>
                            <option value="Agriculture">Agriculture</option>
                            <option value="Mining">Mining</option>
                            <option value="Tourism">Tourism</option>
                            <option value="NGO">NGO</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="description">Job Description *</label>
                    <textarea name="description" id="description" rows="8" required
                              placeholder="Describe the role, responsibilities, and what a typical day looks like..."></textarea>
                </div>

                <div class="form-group">
                    <label for="requirements">Requirements *</label>
                    <textarea name="requirements" id="requirements" rows="6" required
                              placeholder="List qualifications, skills, experience, and education needed..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-large">📢 Post Job</button>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-outline">Cancel</a>
                </div>
            </form>
        </div>
        
        <p style="text-align: center; margin-top: 20px;">
            <a href="{{ url_for('dashboard') }}">← Back to Dashboard</a>
        </p>
    </div>
</body>
</html>
