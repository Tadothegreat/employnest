<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmployNest - Reset Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav class="navbar">
            <a href="{{ url_for('home') }}" style="text-decoration: none; color: #667eea;">
                <h1>🐦 EmployNest</h1>
            </a>
            <div class="nav-links">
                <a href="{{ url_for('login') }}" class="btn btn-outline">Sign In</a>
            </div>
        </nav>

        <!-- Reset Password Form -->
        <div class="form-container">
            <h2>🔑 Reset Your Password</h2>
            <p class="form-intro">Enter your new password below.</p>
            
            <form method="POST" action="{{ url_for('reset_password', token=token) }}">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" name="password" id="password" placeholder="••••••••" required>
                    <small>At least 6 characters. Only letters, numbers, and @ . _ - allowed</small>
                </div>
                
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" name="confirm_password" id="confirm_password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">Reset Password</button>
            </form>
            
            <p style="text-align: center; margin-top: 20px;">
                <a href="{{ url_for('login') }}">← Back to Login</a>
            </p>
        </div>
    </div>
</body>
</html>
